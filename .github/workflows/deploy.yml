name: Deploy web to Cloudflare Workers

# Builds the Next.js app with the OpenNext Cloudflare adapter and deploys it
# (frontend + /api route handlers) to Cloudflare Workers.
#
# Required repository secrets:
#   CLOUDFLARE_API_TOKEN   - token with "Edit Cloudflare Workers" permission
#   CLOUDFLARE_ACCOUNT_ID  - your Cloudflare account id
#
# Runtime secrets for the Worker (set ONCE in the Cloudflare dashboard, or with
# `wrangler secret put`, so the /api handlers can reach Supabase):
#   SUPABASE_URL
#   SUPABASE_SERVICE_ROLE_KEY

on:
  push:
    branches:
      - claude/church-management-system-872rok
      - claude/design-project-impl-r6iiu8
    paths:
      - 'apps/web/**'
      - 'packages/shared/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared types
        run: npm run build -w @tog/shared

      - name: Run unit tests
        run: npm test

      - name: Build web (OpenNext / Cloudflare)
        run: npm run cf:build -w @tog/web

      # Deploy with the repo's own wrangler (v4, reads wrangler.jsonc) rather
      # than the version bundled in cloudflare/wrangler-action.
      - name: Deploy to Cloudflare Workers
        working-directory: apps/web
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Post-deploy smoke test
        run: node apps/web/scripts/smoke-test.mjs
