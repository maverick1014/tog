name: E2E (Playwright browser suite)

# Full browser end-to-end suite. Manual only: it drives a real browser against
# a deployed target and is intended for a browser-capable runner. Every write
# flow creates uniquely-named data and deletes it again so the target stays
# clean. The fast, always-on end-to-end coverage lives in the API E2E that runs
# as part of deploy.yml.
on:
  workflow_dispatch:
    inputs:
      base_url:
        description: Target base URL
        required: false
        default: https://tog-web.tabernacleofgrace-cn.workers.dev

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      E2E_BASE_URL: ${{ github.event.inputs.base_url || 'https://tog-web.tabernacleofgrace-cn.workers.dev' }}
      E2E_EMAIL: ${{ secrets.SMOKE_EMAIL || 'john@grace.org' }}
      E2E_PASSWORD: ${{ secrets.SMOKE_PASSWORD || 'grace2026' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build shared types
        run: npm run build -w @tog/shared
      - name: Install Playwright Chromium
        working-directory: apps/web
        run: npx playwright install --with-deps chromium
      - name: Run E2E tests
        working-directory: apps/web
        run: npx playwright test
      - name: Upload report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/e2e/.report
          retention-days: 14
